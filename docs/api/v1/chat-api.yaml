openapi: "3.0.3"

info:
  title: Chat API
  version: "0.0.0"
  description: REST API for a real-time chat application

servers:
  - url: http://localhost:3000
    description: Local
tags:
  - name: users
    description: User API
  - name: user-detail
    description: User detail API
  - name: auth
    description: Authentication API

paths:
  /api/v1/users:
    $ref: "./paths/users.yaml"
  /api/v1/users/{id}:
    $ref: "./paths/user-detail.yaml"
  /api/v1/auth/login:
    $ref: "./paths/auth-login.yaml"
      
security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT for a request"