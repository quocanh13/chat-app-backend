components:
  schemas:
    User:
      type: object
      properties:
        username: 
          type: string
          example: quocanh
        name: 
          type: string
          example: Nguyễn Quốc Anh
        email: 
          type: string
          example: quocanh@gmail.com
        avatar: 
          type: string
          example: http://localhost:3000/api/v1/file/1

    GetUserResponse:
      type: object
      required:
        - success
      properties:
        success: 
          type: boolean
        detail:
          type: string
        data:
          $ref: "#/components/schemas/User"

    GetResponse:
      $ref: "#/components/schemas/User"