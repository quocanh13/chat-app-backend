post:
  security: []
  tags: [auth]
  summary: Register new account
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/auth.yaml#/components/schemas/RegisterRequest"

  responses:
    "201":
      description: Register successfully

    "400":
      description: Invalid username or password
      content:
        application/json:
          schema:
            $ref: "../components/shared.yaml#/components/schemas/ErrorResponse"

    "409":
      description: Username already exists
      content:
        application/json:
          schema:
            $ref: "../components/shared.yaml#/components/schemas/ErrorResponse"

    "500":
      description: Server error
      content:
        application/json:
          schema:
            $ref: "../components/shared.yaml#/components/schemas/ErrorResponse"